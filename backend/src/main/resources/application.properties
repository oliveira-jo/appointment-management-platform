# Project Configuration
spring.application.name=appointmentmanagementapi

# Server
server.servlet.context-path=/api/v1/
server.error.include-stacktrace=on-param

# Profile Configuration
spring.profiles.active=test

# JPA Configuration
spring.jpa.open-in-view=false

# application.properties
spring.config.import=optional:file:backend/.env[.properties]

# Spring values configuration 
security.client-id=${CLIENT_ID:myclientid}
security.client-secret=${CLIENT_SECRET:myclientsecret}

security.jwt.duration=${JWT_DURATION:86400}

cors.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4200}

# Recover password
email.password-recover.token.minutes=${PASSWORD_RECOVER_TOKEN_MINUTES:30}
email.password-recover.uri=${PASSWORD_RECOVER_URI:http://localhost:5173/recover-password/}