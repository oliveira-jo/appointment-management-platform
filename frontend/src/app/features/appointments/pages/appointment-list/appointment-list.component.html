<div class="container mt-4">
  <h3>Appointments</h3>

  <table class="table table-striped mt-3">
    <thead>
      <tr>
        <th>Customer</th>
        <th>Professional</th>
        <th>Product</th>
        <th>Date</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      @for (a of appointments; track a) {
      <tr>
        <td>{{ a.customerName }}</td>
        <td>{{ a.professionalName }}</td>
        <td>{{ a.productName }}</td>
        <td>{{ a.scheduledAt }}</td>
        <td>{{ a.status }}</td>
      </tr>
      } @empty {
      <tr>
        <td colspan="5">Nenhum agendamento encontrado</td>
      </tr>
      }
    </tbody>
  </table>
  <div class="d-flex justify-content-between mt-3">
    <button class="btn btn-primary" (click)="previousPage()" [disabled]="currentPage === 0">
      Previous
    </button>
    <span>
      Page {{ currentPage + 1 }} / {{ page?.totalPages }}
    </span>
    <button class="btn btn-primary" (click)="nextPage()" [disabled]="page?.last===true">
      Next
    </button>
  </div>
</div>
