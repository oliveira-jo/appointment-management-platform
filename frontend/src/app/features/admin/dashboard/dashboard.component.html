<!-- Principal Dashborad -->
<h2 class="mb-4">Dashboard</h2>
<!-- Metrics -->
<div class="row g-4 mb-5">
  <div class="col-md-3">
    <div class="card shadow-sm border-0 bg-gradient-primary text-white">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center">
          <h5>Agendamentos de Hoje</h5>
          <i class="fas fa-users fa-2x"></i>
        </div>
        <h3 class="mt-3">{{metrics.todayAppointments}}</h3>
      </div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card shadow-sm border-0 bg-gradient-success text-white">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center">
          <h5>Agendamentos da Semanana</h5>
          <i class="fas fa-dollar-sign fa-2x"></i>
        </div>
        <h3 class="mt-3">{{metrics.weekAppointments}}</h3>
      </div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card shadow-sm border-0 bg-gradient-warning text-white">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center">
          <h5>Receita de Hoje</h5>
          <i class="fas fa-tasks fa-2x"></i>
        </div>
        <h3 class="mt-3">{{metrics.todayRevenue | currency:'BRL'}}</h3>
      </div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card shadow-sm border-0 bg-gradient-danger text-white">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center">
          <h5>Total dos Agendamentos</h5>
          <i class="fas fa-bell fa-2x"></i>
        </div>
        <h3 class="mt-3">{{metrics.totalAppointments}}</h3>
      </div>
    </div>
  </div>
</div>
<!-- Options of Managements -->
<div class="row g-4">
  <div class="col-md-3">
    <div class="card mb-5 shadow-sm border-dark">
      <div class="card-body text-center">
        <h3 class="m-4">Agendamentos</h3>
        <button class="btn btn-primary" routerLink="/appointments"> <i class="fas fa-cogs me-2"></i> Gerenciar </button>
      </div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card mb-5 shadow-sm border-dark">
      <div class="card-body text-center">
        <h3 class="m-4">Clientes</h3>
        <button class="btn btn-primary" routerLink="/customers"> <i class="fas fa-cogs me-2"></i> Gerenciar </button>
      </div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card mb-5 shadow-sm border-dark">
      <div class="card-body text-center">
        <h3 class="m-4">Profissionais</h3>
        <button class="btn btn-primary" routerLink="/professionals"> <i class="fas fa-cogs me-2"></i> Gerenciar
        </button>
      </div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card mb-5 shadow-sm border-dark">
      <div class="card-body text-center">
        <h3 class="m-4">Produtos e Serviços</h3>
        <button class="btn btn-primary" routerLink="/products"> <i class="fas fa-cogs me-2"></i> Gerenciar </button>
      </div>
    </div>
  </div>
</div>
