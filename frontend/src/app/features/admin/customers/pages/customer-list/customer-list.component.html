<!-- Main Professionals Painel -->
<h2 class="mb-4">Cliente</h2>

<div class="d-flex justify-content-between mb-3">
  <div class="d-flex gap-2">
    <input type="text" class="form-control" placeholder="Search by email" [(ngModel)]="searchEmail">
    <button class="btn btn-secondary" (click)="search()"> Buscar </button>
  </div>

  <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#customerModal">
    Novo Cliente
  </button>
</div>

<table class="table table-striped table-hover">
  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Telefone</th>
      <th width="150"></th>
    </tr>
  </thead>

  <tbody>
    @for (obj of customers; track obj.id) {
    <tr>
      <td>{{ obj.name }}</td>
      <td>{{ obj.email }}</td>
      <td>{{ obj.phone }}</td>
      <td>
        <button class="btn btn-sm btn-warning me-2" (click)="change(obj.id!)"> Editar </button>
        <button class="btn btn-sm btn-danger" (click)="openDeleteModal(obj.id!)"> Excluir </button>
      </td>
    </tr>
    }
  </tbody>

</table>


<!-- Modal - Customer -->
<div class="modal fade" id="customerModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title"> {{ editingId ? 'Edit Customer' : 'Create Customer' }} </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal">
        </button>
      </div>

      <div class="modal-body">
        <form #form="ngForm" (ngSubmit)="save(form)">
          <div class="mb-3">
            <label>Name</label>
            <input type="text" class="form-control" name="name" required [(ngModel)]="customer.name">
          </div>

          <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control" name="email" required email [(ngModel)]="customer.email">
            <small class="text-danger" *ngIf="form.controls['email']?.invalid && form.controls['email']?.touched">
              Email inválido
            </small>

          </div>

          <div class="mb-3">
            <label>Teletone</label>
            <input type="text" class="form-control" name="phone" required placeholder="(51) 99999-9999"
              [(ngModel)]="customer.phone" (input)="formatPhone()">
          </div>

          <button class="btn btn-success w-100" [disabled]="form.invalid">
            Salvar
          </button>
        </form>
      </div>
    </div>
  </div>

</div>

<!-- Modal - Delete -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Excluir Cliente</h5>
        <button class="btn-close" data-bs-dismiss="modal">
        </button>
      </div>
      <div class="modal-body">
        <p>Tem certeza que quer excluir esse cliente?</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal"> Cancelar </button>
        <button class="btn btn-danger" (click)="delete()"> Excluir </button>
      </div>
    </div>
  </div>
</div>

<!-- Toast Messagens -->
<div class="toast-container position-fixed top-0 end-0 p-3">
  <!-- SUCCESS -->
  <div id="successToast" class="toast align-items-center text-bg-success border-0">
    <div class="d-flex">
      <div class="toast-body">
        {{ successMessage }}
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
  <!-- ERROR -->
  <div id="errorToast" class="toast align-items-center text-bg-danger border-0 mt-2">
    <div class="d-flex">
      <div class="toast-body">
        {{ errorMessage }}
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>
