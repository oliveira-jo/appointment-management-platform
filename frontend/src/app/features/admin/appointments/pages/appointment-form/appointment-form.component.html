<div class="card shadow-sm">

  <div class="card-body">

    <h4 class="mb-4">Novo Agendamento</h4>

    <!-- CUSTOMER -->
    <div class="mb-3">
      <label>Cliente</label>
      <select class="form-select" [(ngModel)]="appointment.customerEmail">
        @for (obj of customers; track obj.id) {
        <option [value]="obj.email">
          {{ obj.email }}
        </option>
        }
      </select>
    </div>

    <!-- PROFESSIONAL -->
    <div class="mb-3">
      <label>Profissional</label>
      <select class="form-select" [(ngModel)]="appointment.professionalEmail">
        @for (obj of professionals; track obj.id) {
        <option [value]="obj.email">
          {{ obj.email }}
        </option>
        }
      </select>
    </div>

    <!-- SERVICE -->
    <div class="mb-3">
      <label>Serviço</label>
      <select class="form-select" [(ngModel)]="appointment.productName">
        @for (obj of products; track obj.id) {
        <option [value]="obj.name">
          {{ obj.name }}
        </option>
        }
      </select>
    </div>

    <!-- DATE -->
    <div class="mb-3">
      <div class="col">
        <label>Data</label>
        <input type="date" class="form-control" [(ngModel)]="date">
      </div>
    </div>

    <!-- Hora -->
    <div class="mb-3">
      <div class="col">
        <label>Hora</label>
        <input type="time" class="form-control" [(ngModel)]="time">
      </div>
    </div>

    <button class="btn btn-success" (click)="save()"> Criar Agendamento </button>

  </div>
</div>

<div class="toast-container position-fixed top-0 end-0 p-3">
  <!-- SUCCESS -->
  <div id="successToast" class="toast align-items-center text-bg-success border-0">
    <div class="d-flex">
      <div class="toast-body">
        {{ successMessage }}
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
  <!-- ERROR -->
  <div id="errorToast" class="toast align-items-center text-bg-danger border-0 mt-2">
    <div class="d-flex">
      <div class="toast-body">
        {{ errorMessage }}
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>
