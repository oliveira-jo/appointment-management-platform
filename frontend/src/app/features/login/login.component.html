<div class="container d-flex align-items-center justify-content-center" style="height:80vh;">

  <div class="card p-4 shadow" style="width: 450px;">
    <h4 class="mb-3">Login</h4>

    <form (ngSubmit)="login()">
      <div class="mb-3">
        <input type="email" class="form-control" placeholder="Email" [(ngModel)]="email" name="email" required>
      </div>

      <div class="mb-3">
        <input type="password" class="form-control" placeholder="Password" [(ngModel)]="password" name="password"
          required>
      </div>

      <button class="btn btn-primary w-100">
        Login
      </button>
    </form>

  </div>

</div>
